# ============================================================
# WaterFun 自动部署
#
# 触发方式:
#   - develop 分支日常 PR 合并到 main → 自动部署 latest
#   - 打 v* tag（如 v1.0.0）→ 自动部署对应版本
#   - 手动触发 → 自定义镜像标签
#
# 流程：
#   Build Admin 前端 → Build 后端 JAR → Build & Push Docker 镜像
#   → SSH 登陆服务器 → 拉取新镜像 → 重启容器 → 上传 Admin 静态文件
#
# 前置条件:
#   1. 服务器上已完成首次手动部署（infra + app compose 已启动）
#   2. 在 GitHub 仓库配置以下 Secrets:
#      - SSH_HOST      服务器 IP
#      - SSH_USER      服务器 SSH 用户名
#      - SSH_KEY       服务器 SSH 私钥
#      - DEPLOY_DOMAIN 部署域名（替换前端 .env.production 占位符）
# ============================================================

name: Deploy

on:
  # ─── 手动触发 ───
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像标签（默认 latest）'
        required: false
        default: 'latest'

  # ─── main 分支 push（合并 PR / 直接提交）→ 部署 latest ───
  push:
    branches: [main]
    paths-ignore:
      - '.ai/**'
      - 'docs/**'
      - 'README.md'
      - '.gitignore'
      - 'LICENSE'

  # ─── 创建 tag（发版）→ 部署版本号 ───
  create:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  # 镜像标签策略：
  # - workflow_dispatch → 用户输入或 latest
  # - push main → latest
  # - create tag → tag 名称（如 v1.0.0）
  IMAGE_TAG: ${{ inputs.tag || (github.ref_type == 'tag' && github.ref_name) || 'latest' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 防止并行部署冲突
    concurrency: deploy

    steps:
      # ==================== Checkout ====================
      - name: Checkout
        uses: actions/checkout@v4

      # ==================== Build Admin Frontend ====================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build admin frontend
        run: |
          # 替换域名占位符为真实域名
          sed -i "s|YOUR_DOMAIN|${{ secrets.DEPLOY_DOMAIN }}|g" waterfun-admin/.env.production
          pnpm --filter @waterfun/admin build

      # 打包前端静态文件，后续通过 SSH 传到服务器
      - name: Archive admin dist
        run: tar -czf admin-dist.tar.gz -C waterfun-admin/dist .

      # ==================== Build Backend ====================
      - name: Setup JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: temurin

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', 'gradle/') }}
          restore-keys: gradle-

      - name: Build backend JARs
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      # ==================== Build & Push Docker Images ====================
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.gateway
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/gateway:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ github.repository }}/gateway:${{ github.sha }}

      - name: Build & push user-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/user-service:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ github.repository }}/user-service:${{ github.sha }}

      - name: Build & push admin-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.admin
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/admin-service:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ github.repository }}/admin-service:${{ github.sha }}

      # ==================== Deploy to Server ====================
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            echo "=== Login GHCR ==="
            # GITHUB_TOKEN 在 workflow 运行期间有效
            # 如需服务器长期可拉镜像，建议创建 GitHub PAT（read:packages）
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} \
              -u ${{ github.actor }} --password-stdin

            echo "=== Pull new images ==="
            cd /opt/waterfun
            export GITHUB_REPOSITORY="${{ github.repository }}"
            export IMAGE_TAG="${{ env.IMAGE_TAG }}"
            docker compose -f deploy/docker/docker-compose.deploy.yml pull

            echo "=== Restart updated services ==="
            docker compose -f deploy/docker/docker-compose.deploy.yml up -d --no-deps \
              gateway user-service admin-service

            echo "=== Cleanup old images ==="
            docker image prune -af --filter "until=24h"

      # ==================== Deploy Admin Static Files ====================
      - name: Upload admin frontend to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: admin-dist.tar.gz
          target: /tmp/
          overwrite: true

      - name: Extract admin frontend on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            ADMIN_DIST="/opt/waterfun/deploy/docker/admin-dist"
            mkdir -p "$ADMIN_DIST"
            tar -xzf /tmp/admin-dist.tar.gz -C "$ADMIN_DIST"
            rm -f /tmp/admin-dist.tar.gz
            echo "Admin frontend deployed to $ADMIN_DIST"
