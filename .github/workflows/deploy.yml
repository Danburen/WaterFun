# ============================================================
# WaterFun 自动部署
#
# 触发方式:
#   - main 分支 push → 自动构建 + 部署 latest
#   - 打 v* tag → 自动构建 + 部署版本号
#   - 手动触发 → 自定义镜像标签
#
# Job 说明:
#   build  — 编译 + 构建 Docker 镜像 + 推送到 GHCR
#   deploy — SSH 登录服务器 → 拉新镜像 → 重启容器 → 上传前端
#
# 前置条件:
#   1. 服务器上已完成首次手动部署（infra + app compose 已启动）
#   2. 在 GitHub 仓库配置以下 Secrets:
#      - SSH_HOST      服务器 IP
#      - SSH_USER      服务器 SSH 用户名
#      - SSH_KEY       服务器 SSH 私钥
#      - DEPLOY_DOMAIN 部署域名（替换前端 .env.production 占位符）
#      - GHCR_PAT      可选。服务器端 docker login 用（已在服务器上手动 login 则不需要）
# ============================================================

name: Deploy

on:
  # ─── 手动触发 ───
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image Tag'
        required: false
        default: 'latest'

  # ─── main 分支 push → 部署 latest ───
  push:
    branches: [main]
    paths-ignore:
      - '.ai/**'
      - 'docs/**'
      - 'README.md'
      - '.gitignore'
      - 'LICENSE'
    # ─── 打 v* tag → 部署版本号 ───
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ inputs.tag || (github.ref_type == 'tag' && github.ref_name) || 'latest' }}

jobs:
  # ================================================================
  # Job 1: Build — 编译 + 构建镜像 + 推送到 GHCR
  # ================================================================
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true

    # 显式授予写包权限，解决：
    # "denied: installation not allowed to Create organization package"
    permissions:
      contents: read
      packages: write

    steps:
      # ── Checkout ──
      - name: Checkout
        uses: actions/checkout@v4

      - name: prepare env
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
          sed -i "s|YOUR_DOMAIN|${{ secrets.DEPLOY_DOMAIN }}|g" \
            waterfun-admin/.env.production \
            waterfun-web-client/.env.production

      # ── Frontend ──
      - name: Setup frontend environment and build admin
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build admin frontend
        run: pnpm --filter @waterfun/admin build

      - name: Archive admin dist
        run: tar -czf admin-dist.tar.gz -C waterfun-admin/dist .

      - name: Build web-client frontend
        run: pnpm --filter @waterfun/web-client build

      # ── Backend ──
      - name: Set Up JDK and Gradle Cache
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: temurin
          cache: 'gradle'

      - name: Build backend JARs
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      # ── Docker Build & Push (4 个镜像) ──
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: gateway
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/gateway:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/gateway:${{ github.sha }}

      - name: Build & push user-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: user-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/user-service:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/user-service:${{ github.sha }}

      - name: Build & push admin-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: admin-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/admin-service:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/admin-service:${{ github.sha }}

      - name: Build & push web-client
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.web-client
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/web-client:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/web-client:${{ github.sha }}

      # ── 传递前端产物给 deploy job ──
      - name: Upload admin-dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: admin-dist.tar.gz
          retention-days: 1

  # ================================================================
  # Job 2: Deploy — SSH 到服务器，拉镜像，重启，上传前端
  # ================================================================
  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    concurrency:
      group: deploy
      cancel-in-progress: false

    steps:
      - name: Lowercase repo name
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Download admin-dist artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-dist

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          timeout: 1800s
          script: |
            set -e

            echo "=== Pull new images from mirror ==="
            cd /opt/waterfun
            export GITHUB_REPOSITORY="${{ env.REPO_LOWER }}"
            export IMAGE_TAG="${{ env.IMAGE_TAG }}"
            docker compose -f deploy/docker/docker-compose.deploy.yml pull

            echo "=== Restart updated services ==="
            docker compose -f deploy/docker/docker-compose.deploy.yml up -d --no-deps \
              gateway user-service admin-service web-client

            echo "=== Cleanup old images ==="
            docker image prune -af --filter "until=24h"

      # ==================== Deploy Admin Static Files ====================
      - name: Upload admin frontend to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: admin-dist.tar.gz
          target: /tmp/
          overwrite: true

      - name: Extract admin frontend on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            ADMIN_DIST="/opt/waterfun/deploy/docker/admin-dist"
            mkdir -p "$ADMIN_DIST"
            tar -xzf /tmp/admin-dist.tar.gz -C "$ADMIN_DIST"
            rm -f /tmp/admin-dist.tar.gz
            echo "Admin frontend deployed to $ADMIN_DIST"
