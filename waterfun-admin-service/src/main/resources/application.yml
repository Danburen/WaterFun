# ---------- 管理服务配置（开发环境） ----------
# 共享配置见 deploy/config/common.yml

spring:
  application:
    name: waterfun-admin-service

  config:
    import:
      - optional:file:./deploy/config/common.yml
      - optional:file:./deploy/config/common-dev-secrets.yml

server:
  port: ${WATERFUN_ADMIN_SERVICE_PORT:8082}

# -------- 业务独有配置 --------

# 用户服务内网地址
user-service:
  url: http://localhost:8081

# COS Token 过期时间（管理端上传）
cloud:
  tencent:
    cos:
      upload-token-expires-seconds: 420

# -------- 开发环境日志（覆盖 common.yml 的 INFO） --------
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
