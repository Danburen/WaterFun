# WaterFun Production Nginx Configuration
# SSL termination + SPA static files + API reverse proxy + Nuxt SSR reverse proxy

upstream gateway {
    server gateway:8080;
}

upstream nuxt {
    server web-client:3000;
}

server {
    listen 80;
    server_name waterfun.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name waterfun.top;

    # SSL certificates (replace with your actual cert path)
    ssl_certificate     /etc/nginx/ssl/waterfun.top.pem;
    ssl_certificate_key /etc/nginx/ssl/waterfun.top.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Admin SPA (built static files)
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
        add_header Cache-Control "public, max-age=3600";
    }

    # API requests → Gateway → backend services
    location /api/ {
        proxy_pass http://gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;

        # CORS handled by Gateway, no need to duplicate
    }

    # WebSocket / SSE support for notifications
    location /api/sse/ {
        proxy_pass http://gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 86400s;
    }

    # Nuxt SSR (user-facing forum)
    location / {
        proxy_pass http://nuxt;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check endpoint
    location /health {
        proxy_pass http://gateway/actuator/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Deny access to .env files and other sensitive resources
    location ~ /\.(env|git|svn) {
        deny all;
        return 404;
    }
}
