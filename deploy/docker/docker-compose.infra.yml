# ============================================================
# WaterFun 基础设施编排（MySQL + Redis + RabbitMQ）
# 与服务编排（docker-compose.app.yml）分离，独立部署
#
# 使用方式：
#   docker network create waterfun-net    # 只需一次
#   docker compose -f docker-compose.infra.yml up -d
#
# 环境变量通过 .env 文件或 shell env 注入
# ============================================================

name: waterfun-infra

services:
  mysql:
    image: mysql:8.0
    container_name: waterfun-mysql
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: waterfun
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=256M
      --max-connections=50
      --tmp-table-size=32M
      --thread-cache-size=10
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 512m
    restart: unless-stopped
    networks:
      - waterfun-net

  redis:
    image: redis:7-alpine
    container_name: waterfun-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    restart: unless-stopped
    networks:
      - waterfun-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: waterfun-rabbitmq
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
    mem_limit: 384m
    restart: unless-stopped
    networks:
      - waterfun-net

networks:
  waterfun-net:
    external: true

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
