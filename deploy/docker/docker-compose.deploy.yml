# ============================================================
# WaterFun 部署编排（CI/CD 全量部署）
#
# 涵盖：反向代理（nginx-proxy + acme-companion）、
#       后端服务（gateway/user-service/admin-service）、
#       前端（web-client/admin-nginx）
#
# 基础设施（MySQL/Redis/RabbitMQ）在 docker-compose.infra.yml 中手动部署
#
# 用法：
#   CI/CD 自动调用：
#     docker compose --env-file deploy/docker/.env -f deploy/docker/docker-compose.deploy.yml pull
#     docker compose --env-file deploy/docker/.env -f deploy/docker/docker-compose.deploy.yml up -d
#
#   手动全量部署（从 DEPLOY_ROOT 运行）：
#     docker compose --env-file deploy/docker/.env -f deploy/docker/docker-compose.deploy.yml up -d
#
# 环境变量通过 --env-file 指定的 .env 文件注入
# ============================================================

name: waterfun-deploy

services:
  # ====================== 反向代理 + SSL ======================
  nginx-proxy:
    image: nginxproxy/nginx-proxy:1.7-alpine
    container_name: waterfun-nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - nginx_certs:/etc/nginx/certs
      - nginx_vhost:/etc/nginx/vhost.d
      - nginx_html:/usr/share/nginx/html
    mem_limit: 64m
    restart: unless-stopped
    networks:
      - waterfun-net

  acme-companion:
    image: nginxproxy/acme-companion:2.3
    container_name: waterfun-acme
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - nginx_certs:/etc/nginx/certs
      - nginx_vhost:/etc/nginx/vhost.d
      - nginx_html:/usr/share/nginx/html
      - acme_state:/etc/acme.sh
    environment:
      DEFAULT_EMAIL: ${SSL_EMAIL:-admin@waterfun.top}
      NGINX_PROXY_CONTAINER: waterfun-nginx-proxy
    depends_on:
      - nginx-proxy
    mem_limit: 64m
    restart: unless-stopped
    networks:
      - waterfun-net

  # ====================== Admin SPA ======================
  admin-nginx:
    image: nginx:1.27-alpine
    container_name: waterfun-admin
    volumes:
      - ./nginx/admin-nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./admin-dist:/usr/share/nginx/html:ro
    environment:
      VIRTUAL_HOST: ${ADMIN_DOMAIN:-admin.waterfun.top}
      LETSENCRYPT_HOST: ${ADMIN_DOMAIN:-admin.waterfun.top}
      LETSENCRYPT_EMAIL: ${SSL_EMAIL:-admin@waterfun.top}
    mem_limit: 32m
    restart: unless-stopped
    networks:
      - waterfun-net

  # ====================== Web Client (Nuxt 4 SSR) ======================
  web-client:
    image: ${REGISTRY:-ghcr.io}/${GITHUB_REPOSITORY:-your-org/waterfun}/web-client:${IMAGE_TAG:-latest}
    container_name: waterfun-web-client
    environment:
      VIRTUAL_HOST: ${WEB_DOMAIN:-waterfun.top}
      VIRTUAL_PORT: 3000
      LETSENCRYPT_HOST: ${WEB_DOMAIN:-waterfun.top}
      NUXT_PUBLIC_API_BASE: https://${API_DOMAIN:-api.waterfun.top}/
      NUXT_PUBLIC_AVATAR_EXPIRE_TIME: '3600'
    mem_limit: 256m
    restart: unless-stopped
    networks:
      - waterfun-net

  # ====================== 后端服务 ======================
  gateway:
    image: ${REGISTRY:-ghcr.io}/${GITHUB_REPOSITORY:-your-org/waterfun}/gateway:${IMAGE_TAG:-latest}
    container_name: waterfun-gateway
    environment:
      VIRTUAL_HOST: ${API_DOMAIN:-api.waterfun.top}
      LETSENCRYPT_HOST: ${API_DOMAIN:-api.waterfun.top}
      LETSENCRYPT_EMAIL: ${SSL_EMAIL:-admin@waterfun.top}
      SPRING_PROFILES_ACTIVE: prod
      WATERFUN_GATEWAY_PORT: 8080
      WATERFUN_USER_SERVICE_URI: http://user-service:8081
      WATERFUN_ADMIN_SERVICE_URI: http://admin-service:8082
      DB_URL: jdbc:mysql://waterfun-mysql:3306/waterfun
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      JAVA_TOOL_OPTIONS: "-Xmx48m -Xms48m -XX:+UseSerialGC"
    volumes:
      - ../config/common.yml:/app/deploy/config/common.yml:ro
      - ../keys:/app/deploy/keys:ro
    mem_limit: 96m
    restart: unless-stopped
    networks:
      - waterfun-net

  user-service:
    image: ${REGISTRY:-ghcr.io}/${GITHUB_REPOSITORY:-your-org/waterfun}/user-service:${IMAGE_TAG:-latest}
    container_name: waterfun-user-service
    environment:
      VIRTUAL_HOST: ${API_DOMAIN:-api.waterfun.top}
      VIRTUAL_PORT: 8081
      LETSENCRYPT_HOST: ${API_DOMAIN:-api.waterfun.top}
      LETSENCRYPT_EMAIL: ${SSL_EMAIL:-admin@waterfun.top}
      SPRING_PROFILES_ACTIVE: prod
      WATERFUN_SERVICE_PORT: 8081
      JWT_PRIVATE_KEY: file:/app/deploy/keys/private.key
      DB_URL: jdbc:mysql://waterfun-mysql:3306/waterfun
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL}
      DEVICE_SALT: ${DEVICE_SALT}
      TENCENT_COS_BUCKET: ${TENCENT_COS_BUCKET}
      TENCENTCLOUD_SECRET_ID: ${TENCENTCLOUD_SECRET_ID}
      TENCENTCLOUD_SECRET_KEY: ${TENCENTCLOUD_SECRET_KEY}
      TENCENTCLOUD_REGION: ${TENCENTCLOUD_REGION:-ap-shanghai}
      RESEND_API_KEY: ${RESEND_API_KEY}
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${ALIBABA_CLOUD_ACCESS_KEY_ID}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET}
      ALIYUN_SMS_SIGN_NAME: ${ALIYUN_SMS_SIGN_NAME}
      ALIYUN_SMS_VERIFY_CODE_TEMPLATE: ${ALIYUN_SMS_VERIFY_CODE_TEMPLATE}
      WATERFUN_KEK: ${WATERFUN_KEK}
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms256m -XX:+UseSerialGC -Dserver.tomcat.max-threads=100"
    volumes:
      - ../config/common.yml:/app/deploy/config/common.yml:ro
      - ../keys:/app/deploy/keys:ro
      - ../resource:/app/deploy/resource:ro
      - ../utils:/app/deploy/utils:ro
    mem_limit: 384m
    restart: unless-stopped
    networks:
      - waterfun-net

  admin-service:
    image: ${REGISTRY:-ghcr.io}/${GITHUB_REPOSITORY:-your-org/waterfun}/admin-service:${IMAGE_TAG:-latest}
    container_name: waterfun-admin-service
    environment:
      VIRTUAL_HOST: ${API_DOMAIN:-api.waterfun.top}
      VIRTUAL_PORT: 8082
      LETSENCRYPT_HOST: ${API_DOMAIN:-api.waterfun.top}
      LETSENCRYPT_EMAIL: ${SSL_EMAIL:-admin@waterfun.top}
      SPRING_PROFILES_ACTIVE: prod
      WATERFUN_ADMIN_SERVICE_PORT: 8082
      JWT_PRIVATE_KEY: file:/app/deploy/keys/private.key
      DB_URL: jdbc:mysql://waterfun-mysql:3306/waterfun
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL}
      DEVICE_SALT: ${DEVICE_SALT}
      TENCENT_COS_BUCKET: ${TENCENT_COS_BUCKET}
      TENCENTCLOUD_SECRET_ID: ${TENCENTCLOUD_SECRET_ID}
      TENCENTCLOUD_SECRET_KEY: ${TENCENTCLOUD_SECRET_KEY}
      TENCENTCLOUD_REGION: ${TENCENTCLOUD_REGION:-ap-shanghai}
      RESEND_API_KEY: ${RESEND_API_KEY}
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${ALIBABA_CLOUD_ACCESS_KEY_ID}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET}
      ALIYUN_SMS_SIGN_NAME: ${ALIYUN_SMS_SIGN_NAME}
      ALIYUN_SMS_VERIFY_CODE_TEMPLATE: ${ALIYUN_SMS_VERIFY_CODE_TEMPLATE}
      WATERFUN_KEK: ${WATERFUN_KEK}
      JAVA_TOOL_OPTIONS: "-Xmx96m -Xms96m -XX:+UseSerialGC -Dserver.tomcat.max-threads=30"
    volumes:
      - ../config/common.yml:/app/deploy/config/common.yml:ro
      - ../keys:/app/deploy/keys:ro
      - ../utils:/app/deploy/utils:ro
    mem_limit: 160m
    restart: unless-stopped
    networks:
      - waterfun-net

networks:
  waterfun-net:
    external: true

volumes:
  nginx_certs:
  nginx_vhost:
  nginx_html:
  acme_state:
