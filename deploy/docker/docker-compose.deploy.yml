# ============================================================
# WaterFun CI/CD 部署编排
# 仅包含后端 Java 服务（从 GHCR 拉取预构建镜像）
#
# 基础设施（MySQL/Redis/RabbitMQ）和反向代理（nginx-proxy + acme-companion）
# 分别在 docker-compose.infra.yml 和 docker-compose.app.yml 中，手动部署一次后不动
#
# 用法（由 CI/CD workflow 调用）:
#   cd /opt/waterfun
#   docker compose -f docker-compose.deploy.yml pull
#   docker compose -f docker-compose.deploy.yml up -d gateway user-service admin-service
#
# 环境变量通过同目录 .env 文件或 shell env 注入
# ============================================================

name: waterfun-deploy

services:
  gateway:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-org/waterfun}/gateway:${IMAGE_TAG:-latest}
    container_name: waterfun-gateway
    environment:
      WATERFUN_GATEWAY_PORT: 8080
      WATERFUN_USER_SERVICE_URI: http://user-service:8081
      WATERFUN_ADMIN_SERVICE_URI: http://admin-service:8082
      DB_URL: jdbc:mysql://mysql:3306/waterfun
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      JAVA_TOOL_OPTIONS: "-Xmx128m -Xms128m"
    volumes:
      - ./common.yml:/app/deploy/config/common.yml:ro
      - ./keys:/app/deploy/keys:ro
    restart: unless-stopped
    networks:
      - waterfun-net

  user-service:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-org/waterfun}/user-service:${IMAGE_TAG:-latest}
    container_name: waterfun-user-service
    environment:
      WATERFUN_SERVICE_PORT: 8081
      JWT_PRIVATE_KEY: file:/app/deploy/keys/private.key
      DB_URL: jdbc:mysql://mysql:3306/waterfun
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL}
      DEVICE_SALT: ${DEVICE_SALT}
      TENCENT_COS_BUCKET: ${TENCENT_COS_BUCKET}
      TENCENTCLOUD_SECRET_ID: ${TENCENTCLOUD_SECRET_ID}
      TENCENTCLOUD_SECRET_KEY: ${TENCENTCLOUD_SECRET_KEY}
      TENCENTCLOUD_REGION: ${TENCENTCLOUD_REGION:-ap-shanghai}
      RESEND_API_KEY: ${RESEND_API_KEY}
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${ALIBABA_CLOUD_ACCESS_KEY_ID}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET}
      WATERFUN_KEK: ${WATERFUN_KEK}
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms256m"
    volumes:
      - ./common.yml:/app/deploy/config/common.yml:ro
      - ./keys:/app/deploy/keys:ro
    restart: unless-stopped
    networks:
      - waterfun-net

  admin-service:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-org/waterfun}/admin-service:${IMAGE_TAG:-latest}
    container_name: waterfun-admin-service
    environment:
      WATERFUN_ADMIN_SERVICE_PORT: 8082
      JWT_PRIVATE_KEY: file:/app/deploy/keys/private.key
      DB_URL: jdbc:mysql://mysql:3306/waterfun
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL}
      DEVICE_SALT: ${DEVICE_SALT}
      TENCENT_COS_BUCKET: ${TENCENT_COS_BUCKET}
      TENCENTCLOUD_SECRET_ID: ${TENCENTCLOUD_SECRET_ID}
      TENCENTCLOUD_SECRET_KEY: ${TENCENTCLOUD_SECRET_KEY}
      TENCENTCLOUD_REGION: ${TENCENTCLOUD_REGION:-ap-shanghai}
      RESEND_API_KEY: ${RESEND_API_KEY}
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${ALIBABA_CLOUD_ACCESS_KEY_ID}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET}
      WATERFUN_KEK: ${WATERFUN_KEK}
      JAVA_TOOL_OPTIONS: "-Xmx128m -Xms128m"
    volumes:
      - ./common.yml:/app/deploy/config/common.yml:ro
      - ./keys:/app/deploy/keys:ro
    restart: unless-stopped
    networks:
      - waterfun-net

networks:
  waterfun-net:
    external: true
