name: waterfun-prod

# ============================================================
# [注意] 生产部署请使用 docker-compose.infra.yml + docker-compose.app.yml
#        当前文件是一键启动所有服务的快捷方式，适用于本地测试/CI
#        它会自动创建 waterfun-net 网络（不依赖外部网络）
# ============================================================
#
# 使用方式（从 deploy/docker/ 目录执行）:
#   docker compose -f docker-compose.prod.yml build
#   docker compose -f docker-compose.prod.yml up -d
#
# 环境变量通过同目录 .env 文件或 shell env 注入
# ============================================================

services:
  # ====================== Infrastructure ======================
  mysql:
    image: mysql:8.0
    container_name: waterfun-mysql
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/keyring.cnf:/etc/mysql/conf.d/keyring.cnf:ro
      - mysql_keyring:/var/lib/mysql-keyring
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: waterfun
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=256M
      --max-connections=50
      --tmp-table-size=32M
      --thread-cache-size=10
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    restart: unless-stopped
    networks:
      - waterfun-net

  redis:
    image: redis:7-alpine
    container_name: waterfun-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    restart: unless-stopped
    networks:
      - waterfun-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: waterfun-rabbitmq
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
    mem_limit: 384m
    restart: unless-stopped
    networks:
      - waterfun-net

  # ====================== Java Services ======================
  gateway:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: gateway
    container_name: waterfun-gateway
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      WATERFUN_GATEWAY_PORT: 8080
      WATERFUN_USER_SERVICE_URI: http://user-service:8081
      WATERFUN_ADMIN_SERVICE_URI: http://admin-service:8082
      DB_URL: jdbc:mysql://mysql:3306/waterfun
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      JAVA_TOOL_OPTIONS: "-Xmx48m -Xms48m -XX:+UseSerialGC"
    volumes:
      - ../../deploy/keys:/app/deploy/keys:ro
      - ../../deploy/config/common.yml:/app/deploy/config/common.yml:ro
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    mem_limit: 96m
    restart: unless-stopped
    networks:
      - waterfun-net

  user-service:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: user-service
    container_name: waterfun-user-service
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      WATERFUN_SERVICE_PORT: 8081
      JWT_PRIVATE_KEY: file:/app/deploy/keys/private.key
      DB_URL: jdbc:mysql://mysql:3306/waterfun
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL}
      DEVICE_SALT: ${DEVICE_SALT}
      TENCENT_COS_BUCKET: ${TENCENT_COS_BUCKET}
      TENCENTCLOUD_SECRET_ID: ${TENCENTCLOUD_SECRET_ID}
      TENCENTCLOUD_SECRET_KEY: ${TENCENTCLOUD_SECRET_KEY}
      TENCENTCLOUD_REGION: ${TENCENTCLOUD_REGION:-ap-shanghai}
      RESEND_API_KEY: ${RESEND_API_KEY}
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${ALIBABA_CLOUD_ACCESS_KEY_ID}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET}
      WATERFUN_KEK: ${WATERFUN_KEK}
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms256m -XX:+UseSerialGC -Dserver.tomcat.max-threads=100"
    volumes:
      - ../../deploy/keys:/app/deploy/keys:ro
      - ../../deploy/config/common.yml:/app/deploy/config/common.yml:ro
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    mem_limit: 384m

  admin-service:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: admin-service
    container_name: waterfun-admin-service
    ports:
      - "127.0.0.1:8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      WATERFUN_ADMIN_SERVICE_PORT: 8082
      JWT_PRIVATE_KEY: file:/app/deploy/keys/private.key
      DB_URL: jdbc:mysql://mysql:3306/waterfun
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL}
      DEVICE_SALT: ${DEVICE_SALT}
      TENCENT_COS_BUCKET: ${TENCENT_COS_BUCKET}
      TENCENTCLOUD_SECRET_ID: ${TENCENTCLOUD_SECRET_ID}
      TENCENTCLOUD_SECRET_KEY: ${TENCENTCLOUD_SECRET_KEY}
      TENCENTCLOUD_REGION: ${TENCENTCLOUD_REGION:-ap-shanghai}
      RESEND_API_KEY: ${RESEND_API_KEY}
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${ALIBABA_CLOUD_ACCESS_KEY_ID}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET}
      WATERFUN_KEK: ${WATERFUN_KEK}
      JAVA_TOOL_OPTIONS: "-Xmx96m -Xms96m -XX:+UseSerialGC -Dserver.tomcat.max-threads=30"
    volumes:
      - ../../deploy/keys:/app/deploy/keys:ro
      - ../../deploy/config/common.yml:/app/deploy/config/common.yml:ro
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    mem_limit: 160m
    restart: unless-stopped
    networks:
      - waterfun-net

networks:
  waterfun-net:
    driver: bridge

volumes:
  mysql_data:
  mysql_keyring:
  redis_data:
  rabbitmq_data:
