# RabbitMQ 3.9+ Configuration File
# Mounted at /etc/rabbitmq/rabbitmq.conf
#
# Replaces deprecated RABBITMQ_VM_MEMORY_HIGH_WATERMARK env var.
# Absolute value is recommended for containerized environments.

# Memory limit: trigger flow control at 256MiB
# Must be less than container mem_limit (384m) to leave headroom
vm_memory_high_watermark.absolute = 256MiB

# Disk free space limit: conservative for small deployments
disk_free_limit.absolute = 1GB

# Management plugin port
management.tcp.port = 15672
