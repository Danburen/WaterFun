name: waterfun-dev

# ============================================================
# WaterFun 开发环境 Docker Compose
# 仅启动基础设施中间件（MySQL / Redis / RabbitMQ）
# Java 服务通过 gradlew.bat bootRun 手动启动，便于断点调试
#
# 使用：docker compose -f docker-compose.dev.yml up
# ============================================================

services:
  mysql:
    image: mysql:8.0
    container_name: waterfun-mysql
    ports:
      - "3306:3306"
    volumes:
      - ../../sqls/init:/docker-entrypoint-initdb.d
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: waterfun
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: waterfun-redis
    ports:
      - "6379:6379"
    volumes:
      - ./.data/redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: waterfun-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./.data/rabbitmq:/var/lib/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped
