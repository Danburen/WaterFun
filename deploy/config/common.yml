# ============================================================
# WaterFun 统一配置模板
#   - 非三方/非敏感配置：自带 :default 开发默认值（零配置启动）
#   - 三方接口/敏感配置：纯 ${VAR} 引用，值由 dev-secrets / 环境变量注入
# ============================================================

# -------- JWT (非三方) --------
jwt:
  issuer: waterfun
  public-key: file:./deploy/keys/public.key
  private-key: ${JWT_PRIVATE_KEY:file:./deploy/keys/private.key}

spring:
  # -------- 数据库 (infra, 非三方) --------
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/waterfun?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # -------- Redis (infra, 非三方) --------
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      database: 0
      username: default
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false

  # -------- RabbitMQ (infra, 非三方) --------
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:admin123}
    virtual-host: /

  # -------- Spring Security 默认用户 (非三方) --------
  security:
    user:
      name: admin
      password: ${SECURITY_USER_PASSWORD:admin}

  # -------- 邮件服务器 (三方服务，值由 dev-secrets / 环境变量注入) --------
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: false
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            port: ${MAIL_PORT}

  # -------- JPA (Hibernate 7 自动识别方言，无需显式指定) --------
  jpa:
    hibernate:
      ddl-auto: validate
    # 关闭 OSIV，需要确保所有访问 lazy 字段的方法都有 @Transactional 配合
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 20

  # -------- 缓存 (Redis) --------
  cache:
    type: redis
    redis:
      time-to-live: 30m
      cache-null-values: false
      key-prefix: "waterfun:"
      use-key-prefix: true

  # -------- Session (Redis) --------
  session:
    timeout: 30m
    redis:
      namespace: session

  # -------- 消息源 --------
  messages:
    basename: messages
    encoding: UTF-8
    cache-duration: 3600s

  # -------- Jackson --------
  jackson:
    mapper:
      accept-case-insensitive-enums: true

# -------- 对象存储 - Tencent COS (三方服务，值由 dev-secrets / 环境变量注入) --------
cloud:
  tencent:
    cos:
      bucket-name: ${TENCENT_COS_BUCKET}
      default-expires-seconds: 3600
      safety-marge-seconds: 300
      upload-expires-seconds: 300
  biz-prefix: waterfun

# -------- SMS - 阿里云 (三方服务，值由 dev-secrets / 环境变量注入) --------
aliyun:
  sms:
    sign-name: ${ALIYUN_SMS_SIGN_NAME}
    verify-code:
      template-name: ${ALIYUN_SMS_VERIFY_CODE_TEMPLATE}

# -------- 通知服务 (三方，值由 dev-secrets / 环境变量注入) --------
mail:
  resend:
    api-key: ${RESEND_API_KEY}
  support:
    email: ${SUPPORT_EMAIL}
  email-verify: https://waterfun.top/api/auth/email/activate?=

# -------- 设备指纹 (非三方) --------
device:
  salt: ${DEVICE_SALT}
  temp:
    ttl: 3600      # 1 hour
  short:
    ttl: 604800    # 7 days
  long:
    ttl: 7776000   # 90 days

# -------- 认证 & Token (非三方) --------
token:
  access:
    expiration: 86400  # 1 day
  refresh:
    rotate: 604800   # 7 days
    family: 2592000  # 30 days

expire:
  email:
    verify: 5                # min
    unverified-expire-hours: 24
  sms-code: 2  # min
  captcha: 2   # min

# -------- 业务公共 (非三方) --------
ip2region:
  db-location: file:./deploy/utils/ip2region_v4.xdb

activity-log:
  flush-interval-ms: 15000

stat:
  flush-interval-ms: 10000

clean-up:
  device:
    max-days: 90

generator:
  uid:
    epoch: 1735689600000
    prefix: 1
    length: 10

# -------- Management --------
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

# -------- 日志级别 --------
logging:
  level:
    root: INFO
    org.springframework.security: WARN
    # 数据库操作日志（每条 SQL 的事务/会话，非常嘈杂，不需要看）
    org.springframework.orm.jpa: WARN
    org.springframework.transaction: WARN
    org.springframework.jdbc: WARN
    org.hibernate.engine.transaction: WARN
    org.hibernate.engine.internal: WARN
    org.hibernate.resource: WARN
    com.zaxxer.hikari: WARN
