spring:
  application:
    name: waterfun-service
  messages: # message source configuration
    basename: messages
    encoding: UTF-8
    cache-duration: 3600s
  web:
    locale: zh_CN
    locale-resolver: accept_header
  cache:
    type: redis
    redis:
      time-to-live: 30m
      cache-null-values: false
      key-prefix: "waterfun:"
      use-key-prefix: true
  session:
    timeout: 30m
    redis:
      namespace: session
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.MySQL8Dialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          batch_size: 20
  config:
    import:
      - optional:file:./deploy/config/common.yml
      - optional:file:./deploy/config/common-dev-secrets.yml

ip2region:
  db-location: file:./deploy/utils/ip2region_v4.xdb
activity-log:
  flush-interval-ms: 15000
sse:
  emitter-timeout-ms: 1800000       # SseEmitter 超时(30min)
  heartbeat-interval-ms: 30000      # 服务端心跳间隔(30s)

ip-ban:
  refresh-interval-ms: 60000        # IP 黑名单缓存刷新间隔(60s)

stat:
  flush-interval-ms: 10000
  exclude-paths: /api/monitor/**
  exclude-internal-ips: true
user-last-active:
  flush-interval-ms: 15000

# Cleanup Configuration
clean-up:
  device:
    max-days: 90

# ---- Auth Configuration (expiration, device TTL) ----
device:
  temp:
    ttl: 3600  # 1 hour
  short:
    ttl: 604800  # 7 days
  long:
    ttl: 7776000  # 90 days
expire:
  email:
    verify: 5 # min
    unverified-expire-hours: 24 # hour
  sms-code: 2 # min
  captcha: 2 # min

# ---- Notification Configuration ----
mail:
  support:
    email: support@mail.waterfun.top
  email-verify: https://waterfun.top/api/auth/email/activate?=

# ---- OSS Configuration ----
cloud:
  tencent:
    cos:
      default-expires-seconds: 3600
      safety-marge-seconds: 300
      upload-expires-seconds: 300
  biz-prefix: waterfun

# ---- Token Configuration ----
token:
  access:
    expiration: 2592000  # 30 days
  refresh:
    rotate: 604800  # 7 days
    family: 2592000  # 30 days

# ---- User Quota ----
user:
  quota:
    tags: 50
    collect: 5000
    daily-posts: 20

# ---- Logging ----
logging:
  level:
    org:
      springframework:
        security: WARN


management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

generator:
  uid:
    epoch: 1735689600000
    prefix: 1
    length: 10
server:
  port: ${WATERFUN_SERVICE_PORT:8081}