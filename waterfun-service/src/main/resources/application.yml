# ---------- 用户服务配置（开发环境） ----------
# 共享配置见 deploy/config/common.yml

spring:
  application:
    name: waterfun-service

  # Flyway 迁移（仅用户服务执行）
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  # 用户端 Web 区域设置
  web:
    locale: zh_CN
    locale-resolver: accept_header

  config:
    import:
      - optional:file:./deploy/config/common.yml
      - optional:file:./deploy/config/common-dev-secrets.yml

server:
  port: ${WATERFUN_SERVICE_PORT:8081}

# -------- 业务独有配置 --------

# SSE 推送
sse:
  emitter-timeout-ms: 1800000
  heartbeat-interval-ms: 30000

# IP 黑名单
ip-ban:
  refresh-interval-ms: 60000

# 统计（排除内部路径）
stat:
  exclude-paths: /api/monitor/**
  exclude-internal-ips: true

# 用户活跃度
user-last-active:
  flush-interval-ms: 15000

# 用户配额
user:
  quota:
    tags: 50
    collect: 5000
    daily-posts: 20

# -------- 开发环境日志（覆盖 common.yml 的 INFO） --------
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
