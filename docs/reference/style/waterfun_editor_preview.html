<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布新帖 - WaterFun</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --primary-light: #eff6ff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --bg: #f8fafc;
            --bg-white: #ffffff;
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px -1px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            --radius: 12px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ========== Header ========== */
        .header {
            background: var(--bg-white);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            flex-shrink: 0;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.25);
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .nav a {
            padding: 8px 14px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            border-radius: var(--radius-sm);
            transition: all 0.2s ease;
        }

        .nav a:hover {
            color: var(--primary);
            background: var(--primary-light);
        }

        .nav a.active {
            color: var(--primary);
            background: var(--primary-light);
        }

        .header-spacer { flex: 1; }

        .search-box {
            position: relative;
            width: 320px;
            flex-shrink: 0;
        }

        .search-box input {
            width: 100%;
            padding: 10px 42px 10px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            background: var(--bg);
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s ease;
        }

        .search-box input:focus {
            border-color: var(--primary);
            background: var(--bg-white);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .search-box input::placeholder { color: var(--text-muted); }

        .search-box button {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .search-box button:hover {
            color: var(--primary);
            background: var(--primary-light);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .icon-btn {
            width: 38px;
            height: 38px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            position: relative;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            color: var(--primary);
            background: var(--primary-light);
        }

        .icon-btn .badge {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            border: 2px solid var(--bg-white);
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 4px 10px 4px 4px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s ease;
            margin-left: 4px;
        }

        .user-menu:hover { background: var(--border-light); }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border);
        }

        .user-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        /* ========== Main ========== */
        .main {
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 24px 48px;
        }

        .page-header {
            margin-bottom: 24px;
        }

        .page-breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .page-breadcrumb a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .page-breadcrumb a:hover { color: var(--primary); }

        .page-breadcrumb i { font-size: 10px; }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        /* ========== Editor Card ========== */
        .editor-card {
            background: var(--bg-white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .editor-body {
            padding: 28px 32px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group:last-child { margin-bottom: 0; }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-label .required { color: #ef4444; margin-left: 2px; }

        .form-hint {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* Title */
        .title-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
            background: var(--bg-white);
            outline: none;
            transition: all 0.2s ease;
        }

        .title-input::placeholder { color: var(--text-muted); font-weight: 400; }

        .title-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* Category */
        .category-select {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .category-option {
            position: relative;
        }

        .category-option input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .category-option label {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--bg-white);
        }

        .category-option label i { font-size: 13px; opacity: 0.7; }

        .category-option input:checked + label {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }

        .category-option input:checked + label i { opacity: 1; }

        .category-option label:hover {
            border-color: #cbd5e1;
            color: var(--text-primary);
        }

        /* ========== Content Editor with Preview ========== */
        .editor-container {
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: var(--bg-white);
            transition: all 0.2s ease;
        }

        .editor-container:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.08);
        }

        /* Editor Toolbar */
        .editor-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            gap: 8px;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .toolbar-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .toolbar-btn:hover {
            color: var(--text-primary);
            background: var(--border-light);
        }

        .toolbar-divider {
            width: 1px;
            height: 20px;
            background: var(--border);
            margin: 0 4px;
        }

        /* Tab Switcher */
        .tab-switcher {
            display: flex;
            align-items: center;
            background: var(--bg-white);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2px;
            gap: 2px;
        }

        .tab-btn {
            padding: 6px 16px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab-btn:hover {
            color: var(--text-secondary);
            background: var(--bg);
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 6px rgba(59, 130, 246, 0.3);
        }

        .tab-btn .tab-icon {
            font-size: 12px;
        }

        /* Editor Content Area */
        .editor-content-area {
            position: relative;
            min-height: 320px;
        }

        .editor-textarea {
            width: 100%;
            min-height: 320px;
            padding: 16px;
            border: none;
            font-size: 15px;
            line-height: 1.8;
            color: var(--text-primary);
            background: var(--bg-white);
            outline: none;
            resize: vertical;
            font-family: inherit;
            display: block;
        }

        .editor-textarea::placeholder { color: var(--text-muted); }

        /* Preview Panel */
        .preview-panel {
            display: none;
            width: 100%;
            min-height: 320px;
            padding: 20px 24px;
            background: var(--bg-white);
        }

        .preview-panel.active {
            display: block;
        }

        /* Markdown Preview Styles */
        .markdown-preview h1 {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0 0 16px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border);
        }

        .markdown-preview h2 {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 24px 0 12px 0;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border-light);
        }

        .markdown-preview h3 {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 20px 0 10px 0;
        }

        .markdown-preview p {
            font-size: 15px;
            line-height: 1.8;
            color: var(--text-secondary);
            margin: 0 0 14px 0;
        }

        .markdown-preview p:last-child {
            margin-bottom: 0;
        }

        .markdown-preview blockquote {
            margin: 16px 0;
            padding: 12px 16px;
            border-left: 4px solid var(--primary);
            background: var(--primary-light);
            border-radius: 0 8px 8px 0;
            color: var(--text-secondary);
            font-style: italic;
        }

        .markdown-preview blockquote p {
            margin: 0;
        }

        .markdown-preview ul, .markdown-preview ol {
            margin: 12px 0;
            padding-left: 24px;
        }

        .markdown-preview li {
            margin: 6px 0;
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.7;
        }

        .markdown-preview code {
            background: #f1f5f9;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
            color: #c7254e;
        }

        .markdown-preview pre {
            background: #1e293b;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 16px 0;
        }

        .markdown-preview pre code {
            background: transparent;
            color: #e2e8f0;
            padding: 0;
            font-size: 13px;
            line-height: 1.6;
        }

        .markdown-preview a {
            color: var(--primary);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .markdown-preview a:hover {
            border-bottom-color: var(--primary);
        }

        .markdown-preview img {
            max-width: 100%;
            border-radius: 8px;
            margin: 12px 0;
        }

        .markdown-preview hr {
            border: none;
            height: 1px;
            background: var(--border);
            margin: 24px 0;
        }

        .markdown-preview table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            font-size: 14px;
        }

        .markdown-preview th, .markdown-preview td {
            padding: 10px 14px;
            border: 1px solid var(--border);
            text-align: left;
        }

        .markdown-preview th {
            background: var(--bg);
            font-weight: 600;
            color: var(--text-primary);
        }

        .markdown-preview td {
            color: var(--text-secondary);
        }

        /* Editor Footer */
        .editor-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: var(--bg);
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-muted);
        }

        .editor-footer-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .editor-footer-left span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Empty Preview State */
        .preview-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 280px;
            color: var(--text-muted);
            text-align: center;
        }

        .preview-empty i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .preview-empty p {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Tags */
        .tag-input-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-white);
            min-height: 46px;
            align-items: center;
            transition: all 0.2s ease;
        }

        .tag-input-wrap:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .tag-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            animation: tagIn 0.2s ease;
        }

        @keyframes tagIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .tag-chip .remove {
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
            font-size: 11px;
        }

        .tag-chip .remove:hover { opacity: 1; }

        .tag-input {
            flex: 1;
            min-width: 80px;
            border: none;
            outline: none;
            font-size: 14px;
            color: var(--text-primary);
            background: transparent;
            padding: 4px;
        }

        .tag-input::placeholder { color: var(--text-muted); }

        .tag-suggestions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .tag-suggestion {
            padding: 4px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tag-suggestion:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }

        /* Action Bar */
        .action-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 32px;
            background: var(--bg);
            border-top: 1px solid var(--border);
        }

        .btn {
            padding: 10px 24px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-secondary {
            background: var(--bg-white);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: #cbd5e1;
            color: var(--text-primary);
            background: var(--border-light);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.35);
            transform: translateY(-1px);
        }

        .btn-draft {
            background: transparent;
            color: var(--text-muted);
            font-weight: 500;
        }

        .btn-draft:hover { color: var(--text-secondary); }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 12px 24px;
            background: var(--text-primary);
            color: white;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            z-index: 300;
            opacity: 0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }

        @media (max-width: 768px) {
            .header-inner { padding: 0 16px; gap: 12px; }
            .nav { display: none; }
            .search-box { width: 160px; }
            .user-name { display: none; }
            .main { padding: 20px 16px 40px; }
            .editor-body { padding: 20px; }
            .action-bar { padding: 16px 20px; flex-direction: column; gap: 12px; }
            .action-bar > div { width: 100%; justify-content: center; }
            .category-select { gap: 8px; }
            .category-option label { padding: 8px 14px; font-size: 13px; }
            .tab-btn { padding: 5px 12px; font-size: 12px; }
            .toolbar-left { display: none; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-inner">
            <a href="#" class="logo">
                <div class="logo-icon">WF</div>
                <span class="logo-text">WaterFun</span>
            </a>
            <nav class="nav">
                <a href="#">首页</a>
                <a href="#">社区</a>
                <a href="#">游乐场</a>
                <a href="#">聊天室</a>
                <a href="#">关于</a>
            </nav>
            <div class="header-spacer"></div>
            <div class="search-box">
                <input type="text" placeholder="请输入搜索内容">
                <button><i class="fas fa-search"></i></button>
            </div>
            <div class="header-actions">
                <button class="icon-btn"><i class="far fa-bell"></i><span class="badge"></span></button>
                <button class="icon-btn"><i class="far fa-envelope"></i></button>
                <div class="user-menu">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Hatcher" alt="avatar" class="user-avatar">
                    <span class="user-name">Hatcher</span>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="page-header">
            <div class="page-breadcrumb">
                <a href="#"><i class="fas fa-home"></i> 首页</a>
                <i class="fas fa-chevron-right"></i>
                <a href="#">社区</a>
                <i class="fas fa-chevron-right"></i>
                <span>发布新帖</span>
            </div>
            <h1 class="page-title">发布新帖</h1>
        </div>

        <div class="editor-card">
            <div class="editor-body">
                <div class="form-group">
                    <label class="form-label">帖子标题 <span class="required">*</span></label>
                    <input type="text" class="title-input" id="titleInput" placeholder="请输入标题，好的标题能吸引更多读者">
                </div>

                <div class="form-group">
                    <label class="form-label">选择分类 <span class="required">*</span></label>
                    <div class="category-select">
                        <div class="category-option">
                            <input type="radio" name="category" id="cat-tech" value="tech" checked>
                            <label for="cat-tech"><i class="fas fa-code"></i> 技术交流</label>
                        </div>
                        <div class="category-option">
                            <input type="radio" name="category" id="cat-life" value="life">

    <script>
        const contentInput = document.getElementById('contentInput');
        const wordCount = document.getElementById('wordCount');
        const tabEdit = document.getElementById('tabEdit');
        const tabPreview = document.getElementById('tabPreview');
        const previewPanel = document.getElementById('previewPanel');
        const previewContent = document.getElementById('previewContent');
        const previewEmpty = document.getElementById('previewEmpty');
        const editorContainer = document.getElementById('editorContainer');

        // Word count
        function updateWordCount() {
            wordCount.textContent = contentInput.value.length + ' 字';
        }
        contentInput.addEventListener('input', updateWordCount);
        updateWordCount();

        // Simple markdown parser for demo
        function parseMarkdown(text) {
            let html = text
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/~~(.*?)~~/g, '<del>$1</del>')
                .replace(/^\> (.*$)/gim, '<blockquote><p>$1</p></blockquote>')
                .replace(/```
?([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/^\- (.*$)/gim, '<li>$1</li>')
                .replace(/^\d+\. (.*$)/gim, '<li>$1</li>')
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
                .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">')
                .replace(/---/g, '<hr>')
                .replace(/

/g, '</p><p>')
                .replace(/
/g, '<br>');

            // Wrap loose li in ul
            html = html.replace(/(<li>.*<\/li>)/g, '<ul>$1</ul>');
            // Fix nested ul
            html = html.replace(/<\/ul>\s*<ul>/g, '');

            if (!html.startsWith('<')) {
                html = '<p>' + html + '</p>';
            }

            return html;
        }

        // Tab switching
        function switchTab(mode) {
            if (mode === 'edit') {
                tabEdit.classList.add('active');
                tabPreview.classList.remove('active');
                contentInput.style.display = 'block';
                previewPanel.classList.remove('active');
                editorContainer.style.borderColor = '';
            } else {
                tabEdit.classList.remove('active');
                tabPreview.classList.add('active');
                contentInput.style.display = 'none';
                previewPanel.classList.add('active');

                const text = contentInput.value.trim();
                if (!text) {
                    previewEmpty.style.display = 'flex';
                    previewContent.innerHTML = '';
                } else {
                    previewEmpty.style.display = 'none';
                    previewContent.innerHTML = parseMarkdown(text);
                }
            }
        }

        tabEdit.addEventListener('click', () => switchTab('edit'));
        tabPreview.addEventListener('click', () => switchTab('preview'));

        // Keyboard shortcut: Ctrl/Cmd + P to toggle preview
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
                e.preventDefault();
                if (tabEdit.classList.contains('active')) {
                    switchTab('preview');
                } else {
                    switchTab('edit');
                }
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                showToast('草稿已保存', 'success');
            }
        });

        // Tags
        const tagWrap = document.getElementById('tagWrap');
        const tagInput = document.getElementById('tagInput');
        let tags = [];

        function addTag(text) {
            text = text.trim();
            if (!text || tags.includes(text) || tags.length >= 5) return;
            tags.push(text);
            const chip = document.createElement('span');
            chip.className = 'tag-chip';
            chip.innerHTML = text + ' <span class="remove"><i class="fas fa-times"></i></span>';
            chip.querySelector('.remove').addEventListener('click', () => {
                tags = tags.filter(t => t !== text);
                chip.remove();
            });
            tagWrap.insertBefore(chip, tagInput);
        }

        tagInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addTag(tagInput.value);
                tagInput.value = '';
            }
            if (e.key === 'Backspace' && !tagInput.value && tags.length > 0) {
                tags.pop();
                tagWrap.querySelectorAll('.tag-chip').item(tags.length)?.remove();
            }
        });

        document.querySelectorAll('.tag-suggestion').forEach(s => {
            s.addEventListener('click', () => addTag(s.dataset.tag));
        });

        // Toast
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');
        let toastTimer;

        function showToast(msg, type) {
            clearTimeout(toastTimer);
            toastMsg.textContent = msg;
            toast.className = 'toast ' + (type || '');
            toast.querySelector('i').className = type === 'success' ? 'fas fa-check-circle' : type === 'error' ? 'fas fa-exclamation-circle' : 'fas fa-info-circle';
            toast.classList.add('show');
            toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        const titleInput = document.getElementById('titleInput');
        document.getElementById('publishBtn').addEventListener('click', () => {
            if (!titleInput.value.trim()) {
                showToast('请填写帖子标题', 'error');
                titleInput.focus();
                return;
            }
            if (!contentInput.value.trim()) {
                showToast('请填写正文内容', 'error');
                contentInput.focus();
                return;
            }
            showToast('帖子发布成功！', 'success');
        });

        document.getElementById('saveDraft').addEventListener('click', () => {
            showToast('草稿已保存', 'success');
        });
    </script>
